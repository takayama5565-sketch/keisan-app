<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分割手数料計算アプリ</title>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --color-primary: #32b8c6; --color-bg: #fcfcf9; --color-surface: #ffffff; --color-text: #134252; --color-border: rgba(94, 82, 64, 0.2); --color-error: #c0152f; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: var(--color-bg); color: var(--color-text); padding: 10px; }
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-box { background: var(--color-surface); padding: 25px; border-radius: 15px; width: 90%; max-width: 340px; text-align: center; }
        .auth-btn { width: 100%; padding: 14px; background: var(--color-primary); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .auth-toggle { background: none; border: none; color: #666; text-decoration: underline; font-size: 12px; padding: 15px; width: 100%; }
        .main-content { display: none; }
        .main-content.unlocked { display: block; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid var(--color-border); overflow-x: auto; }
        .tab-btn { background: none; border: none; padding: 10px; font-size: 13px; color: #666; cursor: pointer; }
        .tab-btn.active { color: var(--color-primary); border-bottom: 3px solid var(--color-primary); font-weight: bold; }
        .box { background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--color-border); margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--color-border); font-size: 16px; margin-bottom: 10px; }
        .btn-add { background: var(--color-primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2 id="authTitle" style="color:var(--color-primary); margin-bottom:15px;">ログイン</h2>
            <div id="authError" style="color:red; font-size:12px; margin-bottom:10px; display:none;"></div>
            <input type="email" id="emailInput" placeholder="メールアドレス">
            <input type="password" id="passwordInput" placeholder="パスワード(6文字以上)">
            <button class="auth-btn" onclick="handleAuth()">実行する</button>
            <button class="auth-toggle" id="authToggleBtn" onclick="toggleAuthMode()">新規登録はこちら</button>
        </div>
    </div>
    <div id="mainContent" class="main-content">
        <div class="tabs">
            <button class="tab-btn active" id="tab-calc" onclick="switchTab('calculator')">計算</button>
            <button class="tab-btn" id="tab-hist" onclick="switchTab('history')">履歴</button>
            <button class="tab-btn" id="tab-set" onclick="switchTab('preset')">設定</button>
        </div>
        <div id="calculator" class="tab-page active">
            <div class="box">
                <label style="font-size:11px; font-weight:bold;">顧客種別</label>
                <select id="customerType" onchange="updateCalculation()">
                    <option value="student">修科生</option>
                    <option value="member">しゅう美会生</option>
                    <option value="instructor">講師</option>
                </select>
                <div id="productsList"></div>
                <button class="btn-add" onclick="addProduct()">+ 商品を追加</button>
            </div>
            <div id="resultsSection" style="display:none;" class="box">
                <div id="summaryDetails"></div>
                <button class="btn-add" style="background:#208d8d; margin-top:10px;" onclick="saveHistory()">結果を保存</button>
            </div>
        </div>
        <div id="history" class="tab-page" style="display:none;"><div id="historySection"></div></div>
        <div id="preset" class="tab-page" style="display:none;">
            <button onclick="auth.signOut()" style="width:100%; padding:10px; color:red; border:1px solid red; background:none; border-radius:8px;">ログアウト</button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDh1IQWyr2Onn_hzKmew9yt5tYBt2fjk7c",
            authDomain: "my-app-eb01f.firebaseapp.com",
            projectId: "my-app-eb01f",
            storageBucket: "my-app-eb01f.firebasestorage.app",
            messagingSenderId: "225201328715",
            appId: "1:225201328715:web:952f9d2d3c4653543eb3ce"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let isSignupMode = false;
        function toggleAuthMode() {
            isSignupMode = !isSignupMode;
            document.getElementById("authTitle").innerText = isSignupMode ? "新規登録" : "ログイン";
            document.getElementById("authToggleBtn").innerText = isSignupMode ? "ログインはこちら" : "新規登録はこちら";
        }
        async function handleAuth() {
            const e = document.getElementById("emailInput").value;
            const p = document.getElementById("passwordInput").value;
            try {
                if (isSignupMode) await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
            } catch (err) { alert(err.message); }
        }
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById("authOverlay").style.display = "none";
                document.getElementById("mainContent").classList.add("unlocked");
            } else {
                document.getElementById("authOverlay").style.display = "flex";
                document.getElementById("mainContent").classList.remove("unlocked");
            }
        });
        function switchTab(name) {
            document.querySelectorAll(".tab-page").forEach(p => p.style.display = "none");
            document.getElementById(name).style.display = "block";
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById("tab-" + name.substring(0,4)).classList.add("active");
        }
        // 以下、計算・保存ロジック（省略していますが、実際の動作には必要です）
        let products = [];
        function addProduct() { products.push({id: Date.now(), price: ""}); renderProducts(); }
        function renderProducts() {
            document.getElementById("productsList").innerHTML = products.map(p => `
                <div class="box"><input type="number" placeholder="金額" oninput="p.price=this.value; updateCalculation()"></div>
            `).join('');
        }
        function updateCalculation() { document.getElementById("resultsSection").style.display = "block"; }
    </script>
</body>
</html>
