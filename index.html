<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分割手数料計算アプリ</title>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --p: #32b8c6; --bg: #fcfcf9; --text: #134252; --border: rgba(94, 82, 64, 0.2); --err: #c0152f; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; line-height: 1.4; }
        .hidden { display: none !important; }
        .box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; border: none; background: var(--p); color: white; }
        .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { background: none; border: none; padding: 12px; color: #666; font-size: 14px; flex: 1; white-space: nowrap; }
        .tab-btn.active { color: var(--p); border-bottom: 3px solid var(--p); font-weight: bold; }
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px dotted #ccc; padding: 6px 0; }
        .btn-del { background: none; border: 1px solid var(--err); color: var(--err); font-size: 11px; padding: 5px; width: auto; margin-top: 5px; }
        h2 { font-size: 14px; color: var(--p); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="setupScreen" class="box" style="margin-top: 50px;">
    <h2>【初回設定】合言葉を決めてください</h2>
    <p style="font-size:12px; margin-bottom:10px; color:#666;">
        Safariの履歴を消しても、この「合言葉」を入れるだけで設定が復活します。好きな言葉（例：名前など）を決めてください。
    </p>
    <input type="text" id="secretKeyInput" placeholder="例: tanaka-keisan">
    <button onclick="setupKey()">アプリを開始する</button>
</div>

<div id="mainContent" class="hidden">
    <header style="text-align:center; padding-bottom:10px;">
        <h1 style="font-size:18px;">分割手数料計算アプリ</h1>
        <div id="keyDisplay" style="font-size:10px; color:#999;"></div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tab-calc" onclick="switchTab('calculator')">計算</button>
        <button class="tab-btn" id="tab-hist" onclick="switchTab('history')">履歴</button>
        <button class="tab-btn" id="tab-pref" onclick="switchTab('preset')">設定管理</button>
    </div>

    <div id="calculator" class="tab-page">
        <div class="box">
            <h2>基本設定</h2>
            <select id="custType" onchange="calc()">
                <option value="student">修科生</option>
                <option value="member">しゅう美会生</option>
            </select>
            <div id="prodList"></div>
            <button onclick="addProd()">+ 商品を追加</button>
        </div>
        <div id="cardArea"></div>
        <button style="background:#208d8d;" onclick="saveHist()">結果を履歴に保存</button>
        <div id="resBox" class="box hidden" style="background:#f0fbfc;"><div id="resDets"></div></div>
    </div>

    <div id="history" class="tab-page hidden"><div id="histSection"></div></div>

    <div id="preset" class="tab-page hidden">
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid var(--err); color:var(--err); font-size:12px;">合言葉を変更（リセット）</button>
        <div class="box"><h2>カード名</h2><div id="setCards"></div><button onclick="addCard()">+ 追加</button></div>
        <div class="box"><h2>ガード価格</h2><div id="setGuard"></div><button onclick="addPre('guard')">+ 追加</button></div>
        <div class="box"><h2>裏物価格</h2><div id="setLining"></div><button onclick="addPre('lining')">+ 追加</button></div>
        <div class="box"><h2>カテゴリー割引率(%)</h2><div id="setCatDisc"></div></div>
    </div>
</div>

<script>
    // --- Firebase構成 ---
    const fbConfig = {
        apiKey: "AIzaSyDh1IQWyr2Onn_hzKmew9yt5tYBt2fjk7c",
        authDomain: "my-app-eb01f.firebaseapp.com",
        projectId: "my-app-eb01f",
        storageBucket: "my-app-eb01f.firebasestorage.app",
        messagingSenderId: "225201328715",
        appId: "1:225201328715:web:952f9d2d3c4653543eb3ce"
    };
    firebase.initializeApp(fbConfig);
    const db = firebase.firestore();

    let myKey = "";
    let data = { preset:{guard:[],lining:[],tailor:[],other:[]}, cards:[], catDisc:{}, hist:[] };
    let prods = [];
    const labels = { kimono_awase:"着物(袷)", kimono_hitoe:"着物(単衣)", homongi_awase:"訪問着(袷)", obi:"帯", small:"小物", guard:"ガード", lining:"裏物", tailor:"仕立", other:"その他" };
    const cats = ["kimono_awase","kimono_hitoe","homongi_awase","obi","small"];

    async function setupKey() {
        const k = document.getElementById("secretKeyInput").value.trim();
        if(!k) return alert("合言葉を入力してください");
        myKey = k; localStorage.setItem("my_app_key", k);
        await loadData();
    }

    async function loadData() {
        const doc = await db.collection("shared_users").doc(myKey).get();
        if(doc.exists) {
            data = doc.data();
        } else {
            // デフォルトデータ
            data.preset = { guard:[{id:1,name:"ガード(標準)",price:3000}], lining:[{id:2,name:"裏物(標準)",price:2000}], tailor:[{id:3,name:"仕立(標準)",price:15000}], other:[] };
            data.cards = [{id:"j",name:"ジャックス",pay:{1:0,12:1.2,24:8.4},skip:{0:0,1:0.5}}];
            cats.forEach(c => data.catDisc[c] = {student:0, member:0});
            await saveData();
        }
        document.getElementById("setupScreen").classList.add("hidden");
        document.getElementById("mainContent").classList.remove("hidden");
        document.getElementById("keyDisplay").innerText = "合言葉: " + myKey;
        renderAll();
        if(prods.length===0) addProd();
    }

    async function saveData() { if(myKey) await db.collection("shared_users").doc(myKey).set(data); }

    function addProd() { prods.push({id:Date.now(), cat:"kimono_awase", price:""}); renderProds(); }
    function renderProds() {
        document.getElementById("prodList").innerHTML = prods.map(p => {
            const isPre = ["guard","lining","tailor","other"].includes(p.cat);
            return `<div class="box" style="background:#f9f9f9; padding:10px;">
                <select onchange="prods.find(x=>x.id==${p.id}).cat=this.value; renderProds(); calc();">
                    ${Object.keys(labels).map(k=>`<option value="${k}" ${p.cat===k?'selected':''}>${labels[k]}</option>`).join('')}
                </select>
                ${isPre ? `<select onchange="const pt=data.preset['${p.cat}'].find(x=>x.id==this.value); if(pt){ prods.find(x=>x.id==${p.id}).price=pt.price; calc(); }"><option>-- 選択 --</option>${data.preset[p.cat].map(o=>`<option value="${o.id}">${o.name}(¥${o.price})</option>`).join('')}</select>` 
                : `<input type="number" value="${p.price}" placeholder="金額" oninput="prods.find(x=>x.id==${p.id}).price=this.value; calc();">`}
                <button class="btn-del" onclick="prods=prods.filter(x=>x.id!=${p.id}); renderProds(); calc();">削除</button></div>`;
        }).join('');
    }

    function renderCards() {
        document.getElementById("cardArea").innerHTML = data.cards.map(c => `
            <div class="box"><b>${c.name}</b><div style="display:flex;gap:5px;">
            <select id="p_${c.id}" onchange="calc()">${Object.keys(c.pay).map(k=>`<option value="${k}">${k}回</option>`).join('')}</select>
            <select id="s_${c.id}" onchange="calc()"><option value="0">スキップなし</option>${Object.keys(c.skip||{}).map(k=>k!=0?`<option value="${k}">${k}ヶ月</option>`:'').join('')}</select>
            </div></div>`).join('');
    }

    function calc() {
        if(prods.length===0) return;
        const type = document.getElementById("custType").value;
        let tB = 0, tD = 0, tA = 0;
        prods.forEach(p => {
            const pr = parseFloat(p.price)||0;
            const rt = data.catDisc[p.cat] ? (data.catDisc[p.cat][type]||0) : 0;
            const d = pr*(rt/100); tB += pr; tD += d; tA += (pr-d);
        });
        let h = `<div class="summary-row"><span>値引前合計</span><span>¥${Math.round(tB).toLocaleString()}</span></div>
                 <div class="summary-row"><span style="color:red;">値引額</span><span style="color:red;">-¥${Math.round(tD).toLocaleString()}</span></div>
                 <div class="summary-row" style="font-weight:bold; font-size:16px;"><span>支払対象額</span><span>¥${Math.round(tA).toLocaleString()}</span></div><hr>`;
        data.cards.forEach(c => {
            const pay = document.getElementById(`p_${c.id}`).value;
            const skp = document.getElementById(`s_${c.id}`).value;
            const rate = (c.pay[pay]||0) + (c.skip[skp]||0);
            const fee = Math.floor(tA * (rate/100)); const fin = tA + fee;
            h += `<div style="margin-top:10px;"><b style="color:var(--p);">${c.name} (${pay}回)</b>
                <div class="summary-row"><span>手数料</span><span>¥${fee.toLocaleString()}</span></div>
                <div class="summary-row"><span>合計</span><b>¥${fin.toLocaleString()}</b></div>
                <div class="summary-row"><span>月々</span><b>¥${Math.floor(fin/pay).toLocaleString()}</b></div></div>`;
        });
        document.getElementById("resDets").innerHTML = h;
        document.getElementById("resBox").classList.remove("hidden");
    }

    async function saveHist() {
        data.hist.unshift({date:Date.now(), txt:document.getElementById("resDets").innerText.split('\n')[2]});
        if(data.hist.length>20) data.hist.pop(); await saveData(); alert("保存しました");
    }

    function switchTab(name) {
        document.querySelectorAll(".tab-page").forEach(p=>p.classList.add("hidden"));
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        document.getElementById(name).classList.remove("hidden");
        document.getElementById("tab-" + name.substring(0,4)).classList.add("active");
        if(name==="preset") renderSettings();
    }

    function renderSettings() {
        document.getElementById("setCards").innerHTML = data.cards.map((c,i)=>`<input value="${c.name}" onchange="data.cards[${i}].name=this.value;saveData();">`).join('');
        document.getElementById("setCatDisc").innerHTML = cats.map(c=>`<div class="summary-row"><span>${labels[c]}</span><div style="display:flex;gap:5px;"><input type="number" value="${data.catDisc[c].student}" onchange="data.catDisc['${c}'].student=this.value;saveData();"><input type="number" value="${data.catDisc[c].member}" onchange="data.catDisc['${c}'].member=this.value;saveData();"></div></div>`).join('');
        ["guard","lining","tailor"].forEach(cat => {
            document.getElementById("set" + cat.charAt(0).toUpperCase() + cat.slice(1)).innerHTML = data.preset[cat].map((p,i)=>`<div class="box"><input value="${p.name}" onchange="data.preset['${cat}'][${i}].name=this.value;saveData();"><input type="number" value="${p.price}" onchange="data.preset['${cat}'][${i}].price=this.value;saveData();"></div>`).join('');
        });
    }

    function addCard() { data.cards.push({id:"c"+Date.now(), name:"新規", pay:{1:0}, skip:{0:0}}); saveData(); renderSettings(); renderCards(); }
    function addPre(c) { data.preset[c].push({id:Date.now(), name:"新規", price:0}); saveData(); renderSettings(); }

    function renderAll() { renderCards(); }

    const k = localStorage.getItem("my_app_key");
    if(k) { myKey = k; loadData(); }
</script>
</body>
</html>
