<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分割手数料計算アプリ Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p: #32b8c6; /* メインカラー：ティール */
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a202c;
            --sub-text: #718096;
            --border: #e2e8f0;
            --accent: #2c7a7b;
            --err: #e53e3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; line-height: 1.5; }
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; }

        /* カード・ボックスデザイン */
        section, .box { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h2 { font-size: 15px; margin-bottom: 15px; color: var(--accent); border-left: 4px solid var(--p); padding-left: 10px; font-weight: 700; }

        /* フォーム要素 */
        label { display: block; font-size: 12px; font-weight: 600; color: var(--sub-text); margin-bottom: 6px; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border); font-size: 16px; margin-bottom: 12px; background: #fff; color: var(--text); transition: border-color 0.2s; }
        input:focus, select:focus { border-color: var(--p); outline: none; }
        
        /* ボタン */
        button { width: 100%; padding: 15px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; font-size: 16px; transition: opacity 0.2s, transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-main { background: var(--p); color: white; }
        .btn-sub { background: #2d3748; color: white; margin-top: 10px; }
        .btn-del { background: #fff5f5; color: var(--err); border: 1px solid #feb2b2; font-size: 12px; padding: 6px; width: auto; margin-top: 5px; }

        /* タブメニュー */
        .tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--border); margin-bottom: 15px; background: #fff; border-radius: 10px; padding: 4px; }
        .tab-btn { background: none; color: var(--sub-text); padding: 10px; border-radius: 8px; flex: 1; margin-bottom: 0; }
        .tab-btn.active { background: var(--p); color: white; }

        /* 計算結果（レシート風） */
        .receipt { background: #fdfdfd; border: 1px dashed var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
        .row.total { font-weight: 800; font-size: 18px; color: var(--text); border-top: 2px solid var(--p); margin-top: 10px; padding-top: 10px; }
        .card-res { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }
        .card-res b { color: var(--p); font-size: 15px; }

        /* 設定画面グリッド */
        .disc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 5px; }
        .disc-grid div { text-align: center; }
        .disc-grid input { text-align: center; margin-bottom: 0; padding: 8px; font-size: 14px; }
        
        header h1 { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; padding: 20px 0;">
        <h1>分割手数料計算アプリ</h1>
        <div id="statusTag" style="font-size:10px; display:inline-block; background:#e2e8f0; padding:2px 8px; border-radius:10px; color:#4a5568; margin-top:5px;">OFFLINE</div>
    </header>

    <div id="setupScreen" class="box" style="margin-top: 20px;">
        <h2>データの保存・復元設定</h2>
        <p style="font-size:12px; color:var(--sub-text); margin-bottom:15px;">
            自分専用の「合言葉」を入力してください。履歴を消去してもこの合言葉でデータが復元されます。
        </p>
        <input type="text" id="secretKeyInput" placeholder="例: yamada-calculator">
        <button class="btn-main" onclick="initApp()">アプリを開始する</button>
    </div>

    <div id="mainContent" class="hidden">
        <div class="tabs">
            <button class="tab-btn active" id="btn-calc" onclick="switchTab('calculator')">計算</button>
            <button class="tab-btn" id="btn-hist" onclick="switchTab('history')">履歴</button>
            <button class="tab-btn" id="btn-set" onclick="switchTab('preset')">リスト設定</button>
        </div>

        <div id="calculator" class="tab-page">
            <section>
                <h2>基本情報</h2>
                <label>顧客種別を選択</label>
                <select id="custType" onchange="runCalc()">
                    <option value="student">修科生</option>
                    <option value="member">しゅう美会生</option>
                    <option value="instructor">講師</option>
                </select>
            </section>
            
            <section>
                <h2>商品明細</h2>
                <div id="productList"></div>
                <button class="btn-main" style="background:#4a5568; margin-top:10px;" onclick="addNewProduct()">+ 商品を追加</button>
            </section>

            <div id="cardSettingArea"></div>

            <button class="btn-main" style="background:var(--accent); margin: 25px 0;" onclick="saveToHistory()">計算結果を履歴に保存</button>

            <div id="resSection" class="hidden">
                <section>
                    <h2>計算結果明細</h2>
                    <div id="receiptContent" class="receipt"></div>
                </section>
            </div>
        </div>

        <div id="history" class="tab-page hidden">
            <div id="historyList"></div>
        </div>

        <div id="preset" class="tab-page hidden">
            <section style="background:#fff5f5; border-color:#feb2b2; text-align:center;">
                <p style="font-size:11px; color:var(--err); margin-bottom:8px;">合言葉の変更や初期化はこちら</p>
                <button onclick="resetApp()" style="background:var(--err); color:white; padding:8px; font-size:12px; width:auto;">アプリを初期化する</button>
            </section>
            <section><h2>カード名設定</h2><div id="setCards"></div><button class="btn-main" style="font-size:12px; padding:10px;" onclick="addCardType()">+ 新規カード追加</button></section>
            <section><h2>カード基本手数料(%)</h2><div id="setCardFees"></div></section>
            <section><h2>スキップ加算手数料(%)</h2><div id="setSkipFees"></div></section>
            <section><h2>ガード価格リスト</h2><div id="setGuard"></div><button class="btn-main" style="font-size:12px; padding:10px;" onclick="addPreset('guard')">+ 追加</button></section>
            <section><h2>裏物価格リスト</h2><div id="setLining"></div><button class="btn-main" style="font-size:12px; padding:10px;" onclick="addPreset('lining')">+ 追加</button></section>
            <section><h2>仕立価格リスト</h2><div id="setTailor"></div><button class="btn-main" style="font-size:12px; padding:10px;" onclick="addPreset('tailor')">+ 追加</button></section>
            <section><h2>その他価格リスト</h2><div id="setOther"></div><button class="btn-main" style="font-size:12px; padding:10px;" onclick="addPreset('other')">+ 追加</button></section>
            <section><h2>基本カテゴリー割引率(%)</h2><div id="setCatDisc"></div></section>
        </div>
    </div>
</div>

<script>
    // --- Firebase初期設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDh1IQWyr2Onn_hzKmew9yt5tYBt2fjk7c",
        authDomain: "my-app-eb01f.firebaseapp.com",
        projectId: "my-app-eb01f",
        storageBucket: "my-app-eb01f.firebasestorage.app",
        messagingSenderId: "225201328715",
        appId: "1:225201328715:web:952f9d2d3c4653543eb3ce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let userKey = "";
    let appData = { preset:{guard:[],lining:[],tailor:[],other:[]}, cards:[], catDisc:{}, prodDisc:{}, history:[] };
    let currentProducts = [];

    const CAT_LABELS = {
        kimono_awase:"着物(袷)", kimono_hitoe:"着物(単衣)", homongi_awase:"訪問着(袷)", homongi_hitoe:"訪問着(単衣)",
        tsukesage_awase:"付下げ(袷)", tsukesage_hitoe:"付下げ(単衣)", nagajuban_awase:"長襦袢(袷)", nagajuban_hitoe:"長襦袢(単衣)",
        coat_awase:"コート(袷)", coat_hitoe:"コート(単衣)", obi:"帯", acc_disc:"小物(値引き有り)", acc_none:"小物(値引き無し)",
        guard:"ガード", lining:"裏物", tailor:"仕立", other:"その他"
    };
    const BASE_CATS = ["kimono_awase","kimono_hitoe","homongi_awase","homongi_hitoe","tsukesage_awase","tsukesage_hitoe","nagajuban_awase","nagajuban_hitoe","coat_awase","coat_hitoe","obi","acc_disc","acc_none"];

    // --- コア機能：データ同期 ---
    async function initApp() {
        const key = document.getElementById("secretKeyInput").value.trim();
        if(!key) return alert("合言葉を入力してください");
        userKey = key;
        localStorage.setItem("my_app_key_v2", userKey);
        await syncData();
    }

    async function syncData() {
        try {
            const doc = await db.collection("shared_users").doc(userKey).get();
            if(doc.exists) {
                appData = doc.data();
                if(!appData.history) appData.history = [];
            } else {
                // 初期マスターデータ作成
                appData.preset = {
                    guard:[{id:1,name:"ガード(標準)",price:3000},{id:2,name:"ガード(厚手)",price:4000},{id:3,name:"ガード(特殊)",price:5000}],
                    lining:[{id:4,name:"裏物(標準)",price:2000},{id:5,name:"裏物(上質)",price:3500},{id:6,name:"裏物(特殊)",price:4500}],
                    tailor:[{id:7,name:"仕立(標準)",price:15000},{id:8,name:"仕立(高級)",price:25000},{id:9,name:"仕立(特殊)",price:35000}],
                    other:[{id:10,name:"その他(¥5,000)",price:5000},{id:11,name:"その他(¥10,000)",price:10000}]
                };
                appData.cards = [
                    {id:"j",name:"ジャックスカード",pay:{1:0,3:0,6:0,10:0,12:1.2,15:3,18:4.8,20:6,24:8.4,30:12,36:15.6},skip:{0:0,3:1.5,4:2,5:2.5,6:3}},
                    {id:"k",name:"ショッピング・KL",pay:{1:0,3:0,6:0,10:0,12:1,15:2.1,18:3.1,20:3.8,24:5.2},skip:{0:0,3:1.5,4:2,5:2.5,6:3}}
                ];
                BASE_CATS.forEach(c => appData.catDisc[c] = {student:0, member:0, instructor:0});
                await pushData();
            }
            document.getElementById("setupScreen").classList.add("hidden");
            document.getElementById("mainContent").classList.remove("hidden");
            document.getElementById("statusTag").innerText = "CONNECTED: " + userKey;
            renderCalculationUI();
            if(!currentProducts.length) addNewProduct();
        } catch(e) { alert("同期エラーが発生しました: " + e.message); }
    }

    async function pushData() { 
        if(userKey) {
            try { await db.collection("shared_users").doc(userKey).set(appData); }
            catch(e) { console.error("Save Error", e); }
        }
    }

    // --- 計算機能 ---
    function addNewProduct() { 
        currentProducts.push({id:Date.now(), cat:"kimono_awase", price:""}); 
        renderProductRows(); 
    }

    function renderProductRows() {
        const list = document.getElementById("productList");
        list.innerHTML = currentProducts.map(p => {
            const isPreset = ["guard","lining","tailor","other"].includes(p.cat);
            return `<div class="box" style="background:#fcfcfc; border-style:dashed;">
                <select onchange="updateProductEntry(${p.id}, 'cat', this.value)">
                    ${Object.keys(CAT_LABELS).map(k=>`<option value="${k}" ${p.cat===k?'selected':''}>${CAT_LABELS[k]}</option>`).join('')}
                </select>
                ${isPreset ? `<select onchange="applyPresetSelection(${p.id}, this.value)"><option value="">-- 商品選択 --</option>${appData.preset[p.cat].map(o=>`<option value="${o.id}" ${p.preId==o.id?'selected':''}>${o.name}(¥${o.price})</option>`).join('')}</select>` 
                : `<input type="number" placeholder="金額を入力" value="${p.price}" oninput="updateProductEntry(${p.id}, 'price', this.value)">`}
                <button class="btn-del" onclick="removeProductEntry(${p.id})">この商品を削除</button></div>`;
        }).join('');
    }

    function updateProductEntry(id, field, val) {
        const p = currentProducts.find(x=>x.id==id);
        if(p) {
            p[field] = val;
            if(field === 'cat') { p.price = ''; p.preId = ''; renderProductRows(); }
            runCalc();
        }
    }

    function applyPresetSelection(pid, targetId) {
        const p = currentProducts.find(x=>x.id==pid);
        const item = appData.preset[p.cat].find(x=>x.id==targetId);
        if(p && item) { p.price = item.price; p.preId = item.id; renderProductRows(); runCalc(); }
    }

    function removeProductEntry(id) {
        currentProducts = currentProducts.filter(x=>x.id!=id);
        renderProductRows(); runCalc();
    }

    function runCalc() {
        if(!currentProducts.length || currentProducts.every(p => !p.price)) {
            document.getElementById("resSection").classList.add("hidden");
            return;
        }
        const type = document.getElementById("custType").value;
        let totalBefore = 0, totalDisc = 0, totalAfter = 0, itemLines = [];

        currentProducts.forEach(p => {
            const price = parseFloat(p.price)||0;
            const rate = BASE_CATS.includes(p.cat) ? (appData.catDisc[p.cat]?.[type]||0) : (appData.prodDisc?.[`${p.cat}_${p.preId}`]?.[type]||0);
            const disc = price * (rate/100);
            totalBefore += price; totalDisc += disc; totalAfter += (price - disc);
            itemLines.push(`<div class="row"><span>${CAT_LABELS[p.cat]}</span><span>¥${Math.round(price).toLocaleString()}</span></div>`);
        });

        const targetAmount = Math.round(totalAfter);
        let html = `<div class="receipt-list"><b style="font-size:12px; color:var(--p);">【商品明細】</b>${itemLines.join('')}</div>
                    <div class="row"><span>値引前合計</span><span>¥${Math.round(totalBefore).toLocaleString()}</span></div>
                    <div class="row"><span style="color:var(--err);">値引合計</span><span style="color:var(--err);">-¥${Math.round(totalDisc).toLocaleString()}</span></div>
                    <div class="row total"><span>お支払対象額</span><span>¥${targetAmount.toLocaleString()}</span></div>`;

        appData.cards.forEach(c => {
            const payCount = parseInt(document.getElementById(`p_${c.id}`).value);
            const skipMonth = parseInt(document.getElementById(`s_${c.id}`).value);
            const feeRate = (parseFloat(c.pay[payCount])||0) + (parseFloat(c.skip?.[skipMonth])||0);
            const feeAmount = Math.floor(targetAmount * (feeRate/100));
            const finalTotal = targetAmount + feeAmount;
            html += `<div class="card-res"><b>${c.name} (${payCount}回払い)</b>
                    <div class="row"><span>分割手数料 (${feeRate}%)</span><span>¥${feeAmount.toLocaleString()}</span></div>
                    <div class="row"><span>お支払総額</span><b>¥${finalTotal.toLocaleString()}</b></div>
                    <div class="row" style="background:#f7fafc; padding:8px; border-radius:5px;"><span>月々のお支払額</span><b style="color:var(--accent); font-size:16px;">¥${Math.floor(finalTotal/payCount).toLocaleString()}</b></div></div>`;
        });

        document.getElementById("receiptContent").innerHTML = html;
        document.getElementById("resSection").classList.remove("hidden");
    }

    // --- その他UI制御 ---
    async function saveToHistory() {
        const content = document.getElementById("receiptContent").innerHTML;
        appData.history.unshift({date:Date.now(), html:content});
        if(appData.history.length>20) appData.history.pop();
        await pushData();
        renderHistoryList();
        alert("履歴に保存しました");
    }

    function renderHistoryList() {
        const hist = document.getElementById("historyList");
        hist.innerHTML = appData.history.length ? appData.history.map((h, i) => `
            <div class="box">
                <div style="font-size:10px; color:var(--sub-text); margin-bottom:8px;">保存日時: ${new Date(h.date).toLocaleString()}</div>
                ${h.html}
                <button class="btn-del" onclick="deleteHistory(${i})">この履歴を削除</button>
            </div>`).join('') : '<p style="text-align:center; padding:40px; color:var(--sub-text);">履歴はありません</p>';
    }

    async function deleteHistory(index) {
        if(confirm("削除しますか？")) {
            appData.history.splice(index, 1);
            await pushData();
            renderHistoryList();
        }
    }

    function switchTab(name) {
        document.querySelectorAll(".tab-page").forEach(p=>p.classList.add("hidden"));
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        document.getElementById(name).classList.remove("hidden");
        document.getElementById("btn-" + name.substring(0,4)).classList.add("active");
        if(name==="preset") renderSettings();
        if(name==="history") renderHistoryList();
    }

    function renderSettings() {
        document.getElementById("setCards").innerHTML = appData.cards.map((c,i)=>`<div class="box" style="padding:10px;"><label>カード名称</label><input value="${c.name}" onchange="appData.cards[${i}].name=this.value;pushData();renderCalculationUI();"></div>`).join('');
        document.getElementById("setCardFees").innerHTML = appData.cards.map((c,i) => `<div class="box"><b style="font-size:13px;">${c.name}</b>${Object.keys(c.pay).sort((a,b)=>a-b).map(k => `<div class="row"><span>${k}回払い</span><input type="number" step="0.1" style="width:80px; margin:0;" value="${c.pay[k]}" onchange="appData.cards[${i}].pay[${k}]=parseFloat(this.value);pushData();"></div>`).join('')}<button class="btn-main" style="padding:8px; font-size:11px;" onclick="const v=prompt('何回払い？'); if(v){appData.cards[${i}].pay[v]=0;renderSettings();}">+ 回数を追加</button></div>`).join('');
        document.getElementById("setSkipFees").innerHTML = appData.cards.map((c,i) => `<div class="box"><b style="font-size:13px;">${c.name}</b>${Object.keys(c.skip||{}).sort((a,b)=>a-b).map(k => `<div class="row"><span>${k}ヶ月スキップ</span><input type="number" step="0.1" style="width:80px; margin:0;" value="${c.skip[k]}" onchange="appData.cards[${i}].skip[${k}]=parseFloat(this.value);pushData();"></div>`).join('')}<button class="btn-main" style="padding:8px; font-size:11px;" onclick="const v=prompt('何ヶ月？'); if(v){if(!appData.cards[${i}].skip)appData.cards[${i}].skip={};appData.cards[${i}].skip[v]=0;renderSettings();}">+ スキップを追加</button></div>`).join('');
        document.getElementById("setCatDisc").innerHTML = BASE_CATS.map(c=>`<div class="box" style="padding:12px;"><label>${CAT_LABELS[c]}</label><div class="disc-grid"><div><div class="disc-label">修科生</div><input type="number" value="${appData.catDisc[c].student}" onchange="appData.catDisc['${c}'].student=parseFloat(this.value);pushData();"></div><div><div class="disc-label">しゅう美会</div><input type="number" value="${appData.catDisc[c].member}" onchange="appData.catDisc['${c}'].member=parseFloat(this.value);pushData();"></div><div><div class="disc-label">講師</div><input type="number" value="${appData.catDisc[c].instructor}" onchange="appData.catDisc['${c}'].instructor=parseFloat(this.value);pushData();"></div></div></div>`).join('');
        ["guard","lining","tailor","other"].forEach(cat => {
            document.getElementById("set" + cat.charAt(0).toUpperCase() + cat.slice(1)).innerHTML = appData.preset[cat].map((p,i)=>{
                const d = appData.prodDisc?.[`${cat}_${p.id}`] || {student:0, member:0, instructor:0};
                return `<div class="box" style="padding:12px;"><label>商品名</label><input value="${p.name}" onchange="appData.preset['${cat}'][${i}].name=this.value;pushData();"><label>金額(円)</label><input type="number" value="${p.price}" onchange="appData.preset['${cat}'][${i}].price=parseFloat(this.value);pushData();">
                <div class="disc-label" style="text-align:left; margin-bottom:5px;">個別割引(修/会/講):</div><div class="disc-grid">
                <input type="number" value="${d.student}" onchange="updateProdDisc('${cat}',${p.id},'student',this.value)"><input type="number" value="${d.member}" onchange="updateProdDisc('${cat}',${p.id},'member',this.value)"><input type="number" value="${d.instructor}" onchange="updateProdDisc('${cat}',${p.id},'instructor',this.value)"></div>
                <button class="btn-del" onclick="appData.preset['${cat}'].splice(${i},1); pushData(); renderSettings();">削除</button></div>`;
            }).join('');
        });
    }

    function updateProdDisc(cat, id, type, val) { 
        if(!appData.prodDisc) appData.prodDisc = {}; 
        const k=`${cat}_${id}`; 
        if(!appData.prodDisc[k]) appData.prodDisc[k]={student:0,member:0,instructor:0}; 
        appData.prodDisc[k][type]=parseFloat(val); 
        pushData(); 
    }

    function addCardType() { appData.cards.push({id:"c"+Date.now(), name:"新規カード", pay:{1:0}, skip:{0:0}}); pushData(); renderSettings(); renderCalculationUI(); }
    function addPreset(c) { appData.preset[c].push({id:Date.now(), name:"新規", price:0}); pushData(); renderSettings(); }
    
    function renderCalculationUI() {
        document.getElementById("cardSettingArea").innerHTML = appData.cards.map(c => `
            <section><h2>${c.name} 計算設定</h2><div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>支払回数</label><select id="p_${c.id}" onchange="runCalc()">${Object.keys(c.pay).sort((a,b)=>a-b).map(k=>`<option value="${k}">${k}回</option>`).join('')}</select></div>
            <div style="flex:1;"><label>スキップ加算</label><select id="s_${c.id}" onchange="runCalc()"><option value="0">なし(0%)</option>${Object.keys(c.skip||{}).sort((a,b)=>a-b).map(k=>k!=0?`<option value="${k}">${k}ヶ月</option>`:'').join('')}</select></div>
            </div></section>`).join('');
    }

    function resetApp() { if(confirm("全データを初期化します。よろしいですか？")){ localStorage.clear(); location.reload(); } }

    const savedKey = localStorage.getItem("my_app_key_v2");
    if(savedKey) { document.getElementById("secretKeyInput").value = savedKey; initApp(); }
</script>
</body>
</html>
