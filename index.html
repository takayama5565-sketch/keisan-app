<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分割手数料計算アプリ Pro v8</title>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --p: #32b8c6; --bg: #fcfcf9; --surf: #ffffff; --text: #134252; --sub: #626c71; --border: rgba(94, 82, 64, 0.2); --err: #c0152f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 12px; line-height: 1.5; }
        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; }
        
        section, .box { background: var(--surf); border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        h2 { font-size: 15px; margin-bottom: 15px; color: var(--p); border-bottom: 2px solid var(--border); padding-bottom: 8px; font-weight: bold; }
        
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 16px; margin-bottom: 10px; background: white; appearance: none; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--sub); margin-bottom: 4px; }
        
        button { width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; font-size: 15px; transition: all 0.2s; }
        .btn-add { background: var(--p); color: white; margin-bottom: 12px; }
        .btn-save { background: #208d8d; color: white; margin: 25px 0; }
        .btn-del { background: #fff5f5; color: var(--err); border: 1px solid var(--err); padding: 6px 12px; font-size: 11px; width: auto; margin-top: 5px; border-radius: 4px; }
        .btn-mini-add { background: #e0f2f1; color: var(--p); border: 1px solid var(--p); padding: 5px 10px; font-size: 11px; width: auto; border-radius: 4px; margin-bottom: 10px; }

        .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 16px; overflow-x: auto; }
        .tab-btn { background: none; border: none; padding: 12px; color: #666; font-size: 14px; flex: 1; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--p); border-bottom-color: var(--p); font-weight: bold; }

        /* レシート風デザイン */
        .receipt { background: #fff; border: 1px dashed #bbb; padding: 20px; font-family: monospace; font-size: 13px; color: #333; }
        .receipt-title { text-align: center; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .receipt-hr { border-top: 1px dashed #ccc; margin: 10px 0; }
        .receipt-total { font-size: 17px; font-weight: bold; }
        .card-res-box { background: #eefbfc; border-left: 5px solid var(--p); padding: 15px; border-radius: 8px; margin-top: 12px; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-3 input { text-align: center; padding: 8px; font-size: 13px; }
        .flex-center { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView" class="box" style="margin-top: 40px;">
        <h2 style="text-align:center;">合言葉でデータを復元</h2>
        <p style="font-size:12px; margin-bottom:15px; color:#666; text-align:center;">
            Safariのデータを消去しても、同じ合言葉を入れれば<br>設定したリストや履歴がすべて元通りになります。
        </p>
        <input type="text" id="secretInput" placeholder="例: tanaka-app-2026">
        <button class="btn-add" onclick="initApp()">アプリを起動して復元</button>
    </div>

    <div id="mainView" class="hidden">
        <header style="text-align:center; padding-bottom:15px;">
            <h1 style="font-size:18px; color:var(--p);">分割手数料計算 Pro</h1>
            <div id="syncStatus" style="font-size:9px; color:#aaa; margin-top:5px;">クラウドと同期中...</div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-calc" onclick="showPage('calculator')">計算</button>
            <button class="tab-btn" id="tab-hist" onclick="showPage('history')">履歴</button>
            <button class="tab-btn" id="tab-set" onclick="showPage('preset')">リスト管理</button>
        </div>

        <div id="page-calculator" class="page-content">
            <section>
                <h2>基本情報</h2>
                <label>顧客種別</label>
                <select id="custType" onchange="runCalculation()">
                    <option value="student">修科生</option>
                    <option value="member">しゅう美会生</option>
                    <option value="instructor">講師</option>
                </select>
            </section>
            
            <section>
                <h2>商品情報</h2>
                <div id="inputRows"></div>
                <button class="btn-add" onclick="addNewRow()">+ 商品を追加</button>
            </section>

            <div id="cardSelectUI"></div>

            <button class="btn-save" onclick="saveToHistory()">計算結果を履歴に保存</button>

            <div id="calcResultView" class="hidden">
                <section>
                    <h2>計算結果（明細レシート）</h2>
                    <div id="receiptArea" class="receipt"></div>
                    <div id="cardResultsArea"></div>
                </section>
            </div>
        </div>

        <div id="page-history" class="page-content hidden">
            <div id="historyListArea"></div>
        </div>

        <div id="page-preset" class="page-content hidden">
            <section style="background:#fff0f0;">
                <button onclick="if(confirm('合言葉をリセットしますか？')){localStorage.clear();location.reload();}" style="background:none; border:1px solid red; color:red; font-size:11px; padding:5px;">合言葉を変更（リセット）</button>
            </section>

            <section>
                <h2>カード管理</h2>
                <div id="manageCardNames"></div>
                <button class="btn-mini-add" onclick="addCardType()">+ 新しいカードを追加</button>
            </section>

            <section><h2>カード手数料管理(%)</h2><div id="manageCardFees"></div></section>
            <section><h2>スキップ手数料管理(%)</h2><div id="manageSkipFees"></div></section>
            <section><h2>ガード管理</h2><div id="manageGuard"></div><button class="btn-mini-add" onclick="addPresetItem('guard')">+ ガードを追加</button></section>
            <section><h2>裏物管理</h2><div id="manageLining"></div><button class="btn-mini-add" onclick="addPresetItem('lining')">+ 裏物を追加</button></section>
            <section><h2>仕立管理</h2><div id="manageTailor"></div><button class="btn-mini-add" onclick="addPresetItem('tailor')">+ 仕立を追加</button></section>
            <section><h2>その他管理</h2><div id="manageOther"></div><button class="btn-mini-add" onclick="addPresetItem('other')">+ その他を追加</button></section>
            
            <section>
                <h2>カテゴリー割引設定</h2>
                <div id="manageCategories"></div>
                <button class="btn-mini-add" onclick="addCustomCat()">+ カテゴリーを追加</button>
            </section>
        </div>
    </div>
</div>

<script>
    // --- Firebase構成 ---
    const fbConfig = {
        apiKey: "AIzaSyDh1IQWyr2Onn_hzKmew9yt5tYBt2fjk7c",
        authDomain: "my-app-eb01f.firebaseapp.com",
        projectId: "my-app-eb01f",
        storageBucket: "my-app-eb01f.firebasestorage.app",
        messagingSenderId: "225201328715",
        appId: "1:225201328715:web:952f9d2d3c4653543eb3ce"
    };
    firebase.initializeApp(fbConfig);
    const db = firebase.firestore();

    let appKey = "";
    let appData = { preset:{guard:[],lining:[],tailor:[],other:[]}, cards:[], catDisc:{}, prodDisc:{}, history:[], customCats:[] };
    let currentRows = [];

    // 初期化
    async function initApp() {
        const k = document.getElementById("secretInput").value.trim();
        if(!k) return alert("合言葉を入力してください");
        appKey = k;
        localStorage.setItem("v8_app_key", appKey);
        await syncData();
    }

    async function syncData() {
        try {
            const doc = await db.collection("shared_users").doc(appKey).get();
            if(doc.exists) {
                appData = doc.data();
                // 欠損データの補完
                if(!appData.history) appData.history = [];
                if(!appData.customCats) appData.customCats = [];
                if(!appData.preset) appData.preset = {guard:[],lining:[],tailor:[],other:[]};
            } else {
                // 初回デフォルト作成
                appData.cards = [{ id:"j", name:"ジャックスカード", pay:{12:1.2, 24:8.4}, skip:{0:0, 6:3} }];
                appData.customCats = [{id:"k_aw", name:"着物(袷)"}, {id:"k_ht", name:"着物(単衣)"}, {id:"obi", name:"帯"}, {id:"small", name:"小物"}];
                appData.customCats.forEach(c => appData.catDisc[c.id] = {student:0, member:0, instructor:0});
                await pushData();
            }
            document.getElementById("setupView").classList.add("hidden");
            document.getElementById("mainView").classList.remove("hidden");
            document.getElementById("syncStatus").innerText = "CONNECTED: " + appKey;
            refreshUI();
            if(!currentRows.length) addNewRow();
        } catch(e) { alert("同期エラー: " + e.message); }
    }

    async function pushData() { 
        if(!appKey) return;
        document.getElementById("syncStatus").innerText = "保存中...";
        await db.collection("shared_users").doc(appKey).set(appData); 
        document.getElementById("syncStatus").innerText = "すべてのデータをクラウドに保存済み";
    }

    // --- 計算・明細表示 ---
    function addNewRow() { currentRows.push({id:Date.now(), cat:"", price:""}); renderInputRows(); }
    function renderInputRows() {
        const list = document.getElementById("inputRows");
        list.innerHTML = currentRows.map(r => {
            const isPre = ["guard","lining","tailor","other"].includes(r.cat);
            return `<div class="box" style="background:#f9f9f9; padding:12px; border-style:dashed;">
                <select onchange="const row=currentRows.find(x=>x.id==${r.id}); row.cat=this.value; row.price=''; row.preId=''; renderInputRows(); runCalculation();">
                    <option value="">-- カテゴリー選択 --</option>
                    ${appData.customCats.map(c=>`<option value="${c.id}" ${r.cat===c.id?'selected':''}>${c.name}</option>`).join('')}
                    <option value="guard" ${r.cat==='guard'?'selected':''}>ガード</option>
                    <option value="lining" ${r.cat==='lining'?'selected':''}>裏物</option>
                    <option value="tailor" ${r.cat==='tailor'?'selected':''}>仕立</option>
                    <option value="other" ${r.cat==='other'?'selected':''}>その他</option>
                </select>
                ${isPre ? `<select onchange="const pt=appData.preset['${r.cat}'].find(x=>x.id==this.value); if(pt){ const row=currentRows.find(x=>x.id==${r.id}); row.price=pt.price; row.preId=pt.id; runCalculation(); }"><option value="">-- 商品選択 --</option>${(appData.preset[r.cat]||[]).map(o=>`<option value="${o.id}" ${r.preId==o.id?'selected':''}>${o.name}(¥${o.price})</option>`).join('')}</select>` 
                : `<input type="number" placeholder="金額を入力" value="${r.price}" oninput="currentRows.find(x=>x.id==${r.id}).price=this.value; runCalculation();">`}
                <button class="btn-del" onclick="currentRows=currentRows.filter(x=>x.id!=${r.id}); renderInputRows(); runCalculation();">削除</button></div>`;
        }).join('');
    }

    function runCalculation() {
        if(!currentRows.length || currentRows.every(r => !r.price)) { document.getElementById("calcResultView").classList.add("hidden"); return; }
        const type = document.getElementById("custType").value;
        let tBef = 0, tDisc = 0, tAft = 0, lines = [];

        currentRows.forEach(r => {
            const price = parseFloat(r.price)||0;
            const catName = appData.customCats.find(c=>c.id===r.cat)?.name || (r.cat==='guard'?'ガード':r.cat==='lining'?'裏物':r.cat==='tailor'?'仕立':r.cat==='other'?'その他':r.cat);
            const rate = appData.catDisc[r.cat] ? (appData.catDisc[r.cat][type]||0) : (appData.prodDisc?.[`${r.cat}_${r.preId}`]?.[type]||0);
            const disc = price * (rate/100);
            tBef += price; tDisc += disc; tAft += (price - disc);
            lines.push(`<div class="receipt-row"><span>${catName}</span><span>¥${Math.round(price).toLocaleString()}</span></div>
                        <div class="receipt-row" style="color:var(--err); font-size:11px;"><span>└ 値引き(${rate}%)</span><span>-¥${Math.round(disc).toLocaleString()}</span></div>`);
        });

        const target = Math.round(tAft);
        let receiptHtml = `<div class="receipt-title">商品お買上明細</div>${lines.join('')}<div class="receipt-hr"></div>
            <div class="receipt-row"><span>値引前合計額</span><span>¥${Math.round(tBef).toLocaleString()}</span></div>
            <div class="receipt-row"><span>合計値引額</span><span>-¥${Math.round(tDisc).toLocaleString()}</span></div>
            <div class="receipt-row receipt-total"><span>お支払対象額</span><span>¥${target.toLocaleString()}</span></div>`;

        let cardHtml = "";
        appData.cards.forEach(c => {
            const p = parseInt(document.getElementById(`p_${c.id}`).value);
            const s = parseInt(document.getElementById(`s_${c.id}`).value);
            const rate = (parseFloat(c.pay[p])||0) + (parseFloat(c.skip?.[s])||0);
            const fee = Math.floor(target * (rate/100)); const fin = target + fee;
            cardHtml += `<div class="card-res-box"><b>${c.name} (${p}回払い)</b>
                <div class="receipt-row"><span>分割手数料(${rate.toFixed(1)}%)</span><span>¥${fee.toLocaleString()}</span></div>
                <div class="receipt-row"><span>お支払総額</span><span style="font-weight:bold; color:var(--p);">¥${fin.toLocaleString()}</span></div>
                <div class="receipt-row" style="border-top:1px solid #ccc; margin-top:5px; padding-top:5px;"><span>月々のお支払額</span><span style="font-size:17px; font-weight:bold;">¥${Math.floor(fin/p).toLocaleString()}</span></div></div>`;
        });

        document.getElementById("receiptArea").innerHTML = receiptHtml;
        document.getElementById("cardResultsArea").innerHTML = cardHtml;
        document.getElementById("calcResultView").classList.remove("hidden");
    }

    // --- 履歴 ---
    async function saveToHistory() {
        const html = document.getElementById("calcResultView").innerHTML;
        appData.history.unshift({date:Date.now(), html:html});
        if(appData.history.length > 20) appData.history.pop();
        await pushData(); renderHistory(); alert("保存完了（最新20件）");
    }
    function renderHistory() {
        document.getElementById("historyListArea").innerHTML = appData.history.length ? appData.history.map((h, i) => `<div class="box"><p style="font-size:10px; color:#999;">${new Date(h.date).toLocaleString()}</p>${h.html}<button class="btn-del" onclick="if(confirm('削除？')){appData.history.splice(${i},1);pushData();renderHistory();}">削除</button></div>`).join('') : '<p style="text-align:center; padding:30px; color:#999;">履歴なし</p>';
    }

    // --- リスト管理のレンダリング ---
    function renderPresetManager() {
        // カード
        document.getElementById("manageCardNames").innerHTML = appData.cards.map((c,i)=>`<div class="flex-center"><input value="${c.name}" oninput="appData.cards[${i}].name=this.value;pushData();refreshUI();"><button class="btn-del" onclick="if(confirm('削除？')){appData.cards.splice(${i},1);pushData();renderPresetManager();}">削除</button></div>`).join('');
        document.getElementById("manageCardFees").innerHTML = appData.cards.map((c,idx) => `<div class="box"><b>${c.name}</b>${Object.keys(c.pay).sort((a,b)=>a-b).map(k => `<div class="receipt-row"><span>${k}回払い(%)</span><div class="flex-center"><input type="number" step="0.1" value="${c.pay[k]}" oninput="appData.cards[${idx}].pay[${k}]=this.value;pushData();"><button class="btn-del" onclick="delete appData.cards[${idx}].pay[${k}];pushData();renderPresetManager();">×</button></div></div>`).join('')}<button class="btn-mini-add" onclick="const v=prompt('何回？'); if(v){appData.cards[${idx}].pay[v]=0;pushData();renderPresetManager();}">+ 回数追加</button></div>`).join('');
        document.getElementById("manageSkipFees").innerHTML = appData.cards.map((c,idx) => `<div class="box"><b>${c.name}</b>${Object.keys(c.skip||{}).sort((a,b)=>a-b).map(k => `<div class="receipt-row"><span>${k}ヶ月(%)</span><div class="flex-center"><input type="number" step="0.1" value="${c.skip[k]}" oninput="appData.cards[${idx}].skip[${k}]=this.value;pushData();"><button class="btn-del" onclick="delete appData.cards[${idx}].skip[${k}];pushData();renderPresetManager();">×</button></div></div>`).join('')}<button class="btn-mini-add" onclick="const v=prompt('何ヶ月？'); if(v){if(!appData.cards[idx].skip)appData.cards[idx].skip={}; appData.cards[idx].skip[v]=0;pushData();renderPresetManager();}">+ 追加</button></div>`).join('');
        
        // ガード等
        ["guard","lining","tailor","other"].forEach(cat => {
            document.getElementById("manage" + cat.charAt(0).toUpperCase() + cat.slice(1)).innerHTML = (appData.preset[cat]||[]).map((p,i)=>{
                const disc = (data.prodDisc && data.prodDisc[`${cat}_${p.id}`]) || {student:0, member:0, instructor:0};
                return `<div class="box"><label>名称</label><input value="${p.name}" oninput="appData.preset['${cat}'][${i}].name=this.value;pushData();"><label>価格</label><input type="number" value="${p.price}" oninput="appData.preset['${cat}'][${i}].price=this.value;pushData();">
                <div class="grid-3"><input type="number" value="${disc.student}" oninput="updProdDisc('${cat}',${p.id},'student',this.value)"><input type="number" value="${disc.member}" oninput="updProdDisc('${cat}',${p.id},'member',this.value)"><input type="number" value="${disc.instructor}" oninput="updProdDisc('${cat}',${p.id},'instructor',this.value)"></div>
                <button class="btn-del" onclick="appData.preset['${cat}'].splice(${i},1);pushData();renderPresetManager();">削除</button></div>`;
            }).join('');
        });

        // カテゴリー設定
        document.getElementById("manageCategories").innerHTML = appData.customCats.map((c,i)=>`
            <div class="box"><div class="flex-center"><input value="${c.name}" oninput="appData.customCats[${i}].name=this.value;pushData();renderInputRows();"><button class="btn-del" onclick="if(confirm('削除？')){appData.customCats.splice(${i},1);pushData();renderPresetManager();}">削除</button></div>
            <div class="grid-3"><div><div style="font-size:9px;">修科</div><input type="number" value="${appData.catDisc[c.id]?.student||0}" oninput="updCatDisc('${c.id}','student',this.value)"></div><div><div style="font-size:9px;">しゅう</div><input type="number" value="${appData.catDisc[c.id]?.member||0}" oninput="updCatDisc('${c.id}','member',this.value)"></div><div><div style="font-size:9px;">講師</div><input type="number" value="${appData.catDisc[c.id]?.instructor||0}" oninput="updCatDisc('${c.id}','instructor',this.value)"></div></div></div>`).join('');
    }

    function updCatDisc(id,t,v) { if(!appData.catDisc[id]) appData.catDisc[id]={}; appData.catDisc[id][t]=parseFloat(v)||0; pushData(); }
    function updProdDisc(c,id,t,v) { if(!appData.prodDisc) appData.prodDisc={}; const k=`${c}_${id}`; if(!appData.prodDisc[k]) appData.prodDisc[k]={}; appData.prodDisc[k][t]=parseFloat(v)||0; pushData(); }
    function addCardType() { appData.cards.push({id:"c"+Date.now(), name:"新規カード", pay:{12:0}, skip:{0:0}}); pushData(); renderPresetManager(); refreshUI(); }
    function addPresetItem(cat) { if(!appData.preset[cat]) appData.preset[cat]=[]; appData.preset[cat].push({id:Date.now(), name:"新規", price:0}); pushData(); renderPresetManager(); }
    function addCustomCat() { const id="cat"+Date.now(); appData.customCats.push({id:id, name:"新規カテゴリー"}); appData.catDisc[id]={student:0,member:0,instructor:0}; pushData(); renderPresetManager(); }

    function showPage(name) {
        document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
        document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
        document.getElementById("page-" + name).classList.remove("hidden");
        document.getElementById("tab-" + name.substring(0,3)).classList.add("active");
        if(name==="preset") renderPresetManager();
        if(name==="history") renderHistory();
    }

    function refreshUI() {
        document.getElementById("cardSelectUI").innerHTML = appData.cards.map(c => `
            <section><h2>${c.name} 設定</h2><div style="display:flex; gap:10px;">
            <div style="flex:1;"><label>回数</label><select id="p_${c.id}" onchange="runCalculation()">${Object.keys(c.pay).sort((a,b)=>a-b).map(k=>`<option value="${k}">${k}回</option>`).join('')}</select></div>
            <div style="flex:1;"><label>スキップ</label><select id="s_${c.id}" onchange="runCalculation()"><option value="0">なし</option>${Object.keys(c.skip||{}).sort((a,b)=>a-b).map(k=>k!=0?`<option value="${k}">${k}ヶ月</option>`:'').join('')}</select></div>
            </div></section>`).join('');
    }

    const savedK = localStorage.getItem("v8_app_key");
    if(savedK) { document.getElementById("secretInput").value = savedK; initApp(); }
</script>
</body>
</html>
